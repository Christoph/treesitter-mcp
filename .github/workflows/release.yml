name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: treesitter-mcp
            asset_name: treesitter-mcp-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: treesitter-mcp.exe
            asset_name: treesitter-mcp-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: treesitter-mcp
            asset_name: treesitter-mcp-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: treesitter-mcp
            asset_name: treesitter-mcp-macos-arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} ${{ matrix.asset_name }}

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true

  homebrew:
    name: Bump Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update formula in tap
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: treesitter-mcp
          formula-path: Formula/treesitter-mcp.rb
          homebrew-tap: Christoph/homebrew-treesitter-mcp
          base-branch: main
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/Christoph/treesitter-mcp.git
          commit-message: |
            treesitter-mcp {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
