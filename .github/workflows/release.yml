name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: treesitter-mcp
            asset_stem: treesitter-mcp-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: treesitter-mcp.exe
            asset_stem: treesitter-mcp-x86_64-pc-windows-msvc
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: treesitter-mcp
            asset_stem: treesitter-mcp-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: treesitter-mcp
            asset_stem: treesitter-mcp-aarch64-apple-darwin

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.artifact_name }}"
          tar -czf "${{ matrix.asset_stem }}.tar.gz" -C dist "${{ matrix.artifact_name }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "${{ matrix.asset_stem }}.tar.gz" | awk '{print $1}' > "${{ matrix.asset_stem }}.tar.gz.sha256"
          else
            sha256sum "${{ matrix.asset_stem }}.tar.gz" | awk '{print $1}' > "${{ matrix.asset_stem }}.tar.gz.sha256"
          fi

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.asset_stem }}.tar.gz
            ${{ matrix.asset_stem }}.tar.gz.sha256
          generate_release_notes: true

  homebrew:
    name: Bump Homebrew formula
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: Christoph/homebrew-treesitter-mcp
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Fetch sha256 sums
        id: sums
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir sums
          gh release download "$TAG" --repo "$REPO" --dir sums --pattern '*.tar.gz.sha256'
          echo "arm64=$(cat sums/treesitter-mcp-aarch64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "intel=$(cat sums/treesitter-mcp-x86_64-apple-darwin.tar.gz.sha256)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(cat sums/treesitter-mcp-x86_64-unknown-linux-gnu.tar.gz.sha256)" >> "$GITHUB_OUTPUT"

      - name: Render formula
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          SHA_ARM64: ${{ steps.sums.outputs.arm64 }}
          SHA_INTEL: ${{ steps.sums.outputs.intel }}
          SHA_LINUX_X86_64: ${{ steps.sums.outputs.linux_x86_64 }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          cat > tap/Formula/treesitter-mcp.rb <<RUBY
          class TreesitterMcp < Formula
            desc "AST-first MCP server for token-efficient code analysis"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "${BASE_URL}/treesitter-mcp-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM64}"
              end
              on_intel do
                url "${BASE_URL}/treesitter-mcp-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE_URL}/treesitter-mcp-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              bin.install "treesitter-mcp"
            end

            test do
              assert_predicate bin/"treesitter-mcp", :exist?
              assert_predicate bin/"treesitter-mcp", :executable?
            end
          end
          RUBY

      - name: Commit and push
        working-directory: tap
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/treesitter-mcp.rb
          if git diff --cached --quiet; then
            echo "No formula changes"
            exit 0
          fi
          git commit -m "treesitter-mcp ${TAG#v}"
          git push

