<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Token efficiency: treesitter-mcp vs agent-style shell baselines</title>
  <desc id="desc">Horizontal bar chart comparing raw tokens from realistic shell workflows (cat, grep, find+head) against MCP tool payloads across five workflows. Log scale. Sample sizes 3 to 4 per row.</desc>
  <defs>
    <style><![CDATA[
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #dbe5f0; stroke-width: 1; }
      .title { font: 700 26px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #111827; }
      .subtitle { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #4b5563; }
      .row-label { font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #111827; }
      .row-sub { font: 400 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6b7280; }
      .axis { font: 500 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6b7280; }
      .bar-raw { fill: #cbd5e1; }
      .bar-mcp { fill: #2563eb; }
      .bar-label-raw { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #475569; }
      .bar-label-mcp { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #1d4ed8; }
      .multiplier { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #059669; }
      .legend { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #374151; }
      .note { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; fill: #6b7280; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
    ]]></style>
  </defs>

  <rect class="bg" width="1100" height="620"/>
  <rect class="panel" x="20" y="20" width="1060" height="580" rx="10"/>

  <text class="title" x="48" y="58">Token cost: treesitter-mcp vs agent-style shell baselines</text>
  <text class="subtitle" x="48" y="82">Baselines emulate grep / find / targeted cat — the commands an agent would actually run. Log scale.</text>

  <!-- Legend -->
  <rect class="bar-raw" x="760" y="48" width="18" height="12" rx="2"/>
  <text class="legend" x="785" y="58">shell baseline</text>
  <rect class="bar-mcp" x="900" y="48" width="18" height="12" rx="2"/>
  <text class="legend" x="925" y="58">MCP tool</text>

  <!-- Chart area: x = 360 .. 980, y rows start 130, row height 80 -->
  <!-- Log10 axis: 100, 1000, 10000, 100000 -->
  <!-- Map tokens t to x: x = 360 + (log10(t) - 2) / 3 * 620  (100 -> 360, 100000 -> 980) -->

  <!-- Gridlines -->
  <line class="grid" x1="360" y1="110" x2="360" y2="540"/>
  <line class="grid" x1="566.7" y1="110" x2="566.7" y2="540"/>
  <line class="grid" x1="773.3" y1="110" x2="773.3" y2="540"/>
  <line class="grid" x1="980" y1="110" x2="980" y2="540"/>
  <text class="axis" x="360" y="558" text-anchor="middle">100</text>
  <text class="axis" x="566.7" y="558" text-anchor="middle">1,000</text>
  <text class="axis" x="773.3" y="558" text-anchor="middle">10,000</text>
  <text class="axis" x="980" y="558" text-anchor="middle">100,000</text>
  <text class="axis" x="670" y="578" text-anchor="middle">tokens (tiktoken cl100k_base, log scale)</text>

  <!-- Row 1: Overview. raw 852, mcp 314, 2.7x -->
  <!-- x(852)=360 + (2.930-2)/3*620 = 360+192.2 = 552.2 -->
  <!-- x(314)=360 + (2.497-2)/3*620 = 360+102.7 = 462.7 -->
  <text class="row-label" x="40" y="146">File overview</text>
  <text class="row-sub" x="40" y="162">view_code(signatures) vs cat file</text>
  <rect class="bar-raw" x="360" y="135" width="192.2" height="14" rx="2"/>
  <text class="bar-label-raw" x="558" y="146">852</text>
  <rect class="bar-mcp" x="360" y="155" width="102.7" height="14" rx="2"/>
  <text class="bar-label-mcp" x="468" y="166">314</text>
  <text class="multiplier" x="1050" y="156" text-anchor="end">2.7× smaller</text>

  <!-- Row 2: Focused edit. raw 852, mcp 170, 5.0x -->
  <!-- x(170)=360 + (2.230-2)/3*620 = 360+47.6 = 407.6 -->
  <text class="row-label" x="40" y="226">Focused edit</text>
  <text class="row-sub" x="40" y="242">minimal_edit_context vs cat file</text>
  <rect class="bar-raw" x="360" y="215" width="192.2" height="14" rx="2"/>
  <text class="bar-label-raw" x="558" y="226">852</text>
  <rect class="bar-mcp" x="360" y="235" width="47.6" height="14" rx="2"/>
  <text class="bar-label-mcp" x="413" y="246">170</text>
  <text class="multiplier" x="1050" y="236" text-anchor="end">5.0× smaller</text>

  <!-- Row 3: Repo search. raw 3803, mcp 837, 4.5x -->
  <!-- x(3803)=360+(3.580-2)/3*620 = 360+326.5 = 686.5 -->
  <!-- x(837)=360+(2.923-2)/3*620 = 360+190.7 = 550.7 -->
  <text class="row-label" x="40" y="306">Repo search</text>
  <text class="row-sub" x="40" y="322">find_usages vs grep -rn -C3</text>
  <rect class="bar-raw" x="360" y="295" width="326.5" height="14" rx="2"/>
  <text class="bar-label-raw" x="693" y="306">3,803</text>
  <rect class="bar-mcp" x="360" y="315" width="190.7" height="14" rx="2"/>
  <text class="bar-label-mcp" x="556" y="326">837</text>
  <text class="multiplier" x="1050" y="316" text-anchor="end">4.5× smaller</text>

  <!-- Row 4: Directory map. raw 8978, mcp 2783, 3.2x -->
  <!-- x(8978)=360+(3.953-2)/3*620 = 360+403.6 = 763.6 -->
  <!-- x(2783)=360+(3.445-2)/3*620 = 360+298.6 = 658.6 -->
  <text class="row-label" x="40" y="386">Directory map</text>
  <text class="row-sub" x="40" y="402">code_map(minimal) vs find + head -50</text>
  <rect class="bar-raw" x="360" y="375" width="403.6" height="14" rx="2"/>
  <text class="bar-label-raw" x="770" y="386">8,978</text>
  <rect class="bar-mcp" x="360" y="395" width="298.6" height="14" rx="2"/>
  <text class="bar-label-mcp" x="664" y="406">2,783</text>
  <text class="multiplier" x="1050" y="396" text-anchor="end">3.2× smaller</text>

  <!-- Row 5: Call graph. raw 59513, mcp 1044, 57.0x -->
  <!-- x(59513)=360+(4.775-2)/3*620 = 360+573.5 = 933.5 -->
  <!-- x(1044)=360+(3.019-2)/3*620 = 360+210.6 = 570.6 -->
  <text class="row-label" x="40" y="466">Call graph trace</text>
  <text class="row-sub" x="40" y="482">call_graph vs grep + cat matched files</text>
  <rect class="bar-raw" x="360" y="455" width="573.5" height="14" rx="2"/>
  <text class="bar-label-raw" x="940" y="466">59,513</text>
  <rect class="bar-mcp" x="360" y="475" width="210.6" height="14" rx="2"/>
  <text class="bar-label-mcp" x="576" y="486">1,044</text>
  <text class="multiplier" x="1050" y="476" text-anchor="end">57× smaller</text>

  <text class="note" x="48" y="600">
    Averages over 18 runs across Rust, TypeScript, Python, JavaScript. Sample sizes 3–4 per row — treat as indicative, not precise.
  </text>
</svg>
