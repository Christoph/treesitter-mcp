<svg xmlns="http://www.w3.org/2000/svg" width="1680" height="1880" viewBox="0 0 1680 1880" role="img" aria-labelledby="title desc">
  <title id="title">Average token efficiency: treesitter-mcp vs default shell reads</title>
  <desc id="desc">Average benchmark across 18 runs comparing raw shell-style file reads against compact treesitter-mcp tool responses, measured with tiktoken_rs cl100k_base.</desc>
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .card { fill: #ffffff; stroke: #dbe5f0; stroke-width: 1.4; }
      .blueCard { fill: #eff6ff; stroke: #bfdbfe; stroke-width: 1.2; }
      .greenCard { fill: #ecfdf5; stroke: #a7f3d0; stroke-width: 1.2; }
      .title { font: 800 52px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .subtitle { font: 400 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #617089; }
      .section { font: 800 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 800 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #617089; letter-spacing: .4px; }
      .text { font: 500 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #617089; }
      .mono { font: 650 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #243049; }
      .metric { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .metricBlue { font: 800 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2563eb; }
      .metricGreen { font: 800 36px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #059669; }
      .chipLabel { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2563eb; }
      .chipValue { font: 800 46px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .chipTail { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #617089; }
      .bullet { fill: #2563eb; }
    </style>
  </defs>

  <rect class="bg" width="1680" height="1880"/>

  <rect class="card" x="56" y="48" width="1568" height="272" rx="30"/>
  <text class="title" x="96" y="122">Average Token Efficiency: MCP vs Default Reads</text>
  <text class="subtitle" x="98" y="168">This is an averaged benchmark across 18 measured runs, not a single hand-picked file.</text>
  <text class="subtitle" x="98" y="206">Baseline = raw shell-style reads such as cat file or concatenated directory dumps.</text>
  <text class="subtitle" x="98" y="244">MCP side = compact tool response JSON from the same implementations the built server returns.</text>

  <rect class="blueCard" x="96" y="252" width="430" height="50" rx="16"/>
  <text class="chipLabel" x="152" y="284">FOCUSED EDITS</text>
  <text class="chipValue" x="316" y="292">5.0x</text>
  <text class="chipTail" x="432" y="285">smaller on average</text>

  <rect class="blueCard" x="624" y="252" width="430" height="50" rx="16"/>
  <text class="chipLabel" x="678" y="284">REPO SEARCH</text>
  <text class="chipValue" x="834" y="292">77.8x</text>
  <text class="chipTail" x="990" y="285">smaller on average</text>

  <rect class="blueCard" x="1152" y="252" width="430" height="50" rx="16"/>
  <text class="chipLabel" x="1206" y="284">DIRECTORY MAPS</text>
  <text class="chipValue" x="1388" y="292">27.7x</text>
  <text class="chipTail" x="1526" y="285">smaller on average</text>

  <text class="section" x="72" y="382">How it was measured</text>
  <rect class="greenCard" x="72" y="408" width="1536" height="154" rx="20"/>
  <text class="text" x="104" y="448">Standard tools used in the comparison: <tspan class="mono">cat file</tspan>, <tspan class="mono">cat src/analysis/*.rs</tspan>, and</text>
  <text class="text" x="104" y="484"><tspan class="mono">find &lt;tree&gt; -exec cat</tspan> style concatenation for directory-sized baselines.</text>
  <text class="text" x="104" y="520">MCP tools measured: <tspan class="mono">view_code</tspan>, <tspan class="mono">minimal_edit_context</tspan>, <tspan class="mono">call_graph</tspan>,</text>
  <text class="text" x="104" y="556"><tspan class="mono">find_usages</tspan>, and <tspan class="mono">code_map</tspan>. Both sides were counted with <tspan class="mono">tiktoken_rs::cl100k_base()</tspan>.</text>

  <text class="section" x="72" y="626">Why the MCP tools win</text>
  <rect class="card" x="72" y="652" width="1536" height="166" rx="22"/>
  <circle class="bullet" cx="108" cy="700" r="6"/><text class="text" x="128" y="707"><tspan class="mono">view_code(signatures)</tspan> keeps API shape and drops implementation bodies.</text>
  <circle class="bullet" cx="108" cy="738" r="6"/><text class="text" x="128" y="745"><tspan class="mono">minimal_edit_context</tspan> keeps only the target symbol and nearby dependencies.</text>
  <circle class="bullet" cx="108" cy="776" r="6"/><text class="text" x="128" y="783"><tspan class="mono">call_graph</tspan> returns caller/callee edges directly instead of forcing manual tracing.</text>
  <circle class="bullet" cx="856" cy="700" r="6"/><text class="text" x="876" y="707"><tspan class="mono">find_usages</tspan> returns only matching rows with scope and context.</text>
  <circle class="bullet" cx="856" cy="738" r="6"/><text class="text" x="876" y="745"><tspan class="mono">code_map</tspan> summarizes a directory without loading every function body.</text>

  <text class="section" x="72" y="882">Average benchmark rows</text>

  <rect class="card" x="72" y="910" width="736" height="250" rx="22"/>
  <text class="label" x="104" y="952">WORKFLOW AVERAGE</text><text class="metricBlue" x="104" y="990">Overview</text><text class="small" x="296" y="985">4 runs</text>
  <text class="label" x="104" y="1028">STANDARD TOOL</text><text class="mono" x="104" y="1058">cat &lt;4 source files&gt;</text>
  <text class="label" x="104" y="1094">MCP TOOL</text><text class="mono" x="104" y="1124">view_code(detail=signatures)</text>
  <text class="label" x="104" y="1160">RAW AVG</text><text class="metric" x="104" y="1198">852</text>
  <text class="label" x="244" y="1160">MCP AVG</text><text class="metric" x="244" y="1198">314</text>
  <text class="label" x="384" y="1160">SAVED</text><text class="metric" x="384" y="1198">538</text>
  <text class="label" x="548" y="1160">SMALLER</text><text class="metricGreen" x="548" y="1198">2.7x</text>

  <rect class="card" x="872" y="910" width="736" height="250" rx="22"/>
  <text class="label" x="904" y="952">WORKFLOW AVERAGE</text><text class="metricBlue" x="904" y="990">Focused edit</text><text class="small" x="1132" y="985">4 runs</text>
  <text class="label" x="904" y="1028">STANDARD TOOL</text><text class="mono" x="904" y="1058">cat &lt;4 source files&gt;</text>
  <text class="label" x="904" y="1094">MCP TOOL</text><text class="mono" x="904" y="1124">minimal_edit_context(symbol_name=...)</text>
  <text class="label" x="904" y="1160">RAW AVG</text><text class="metric" x="904" y="1198">852</text>
  <text class="label" x="1044" y="1160">MCP AVG</text><text class="metric" x="1044" y="1198">170</text>
  <text class="label" x="1184" y="1160">SAVED</text><text class="metric" x="1184" y="1198">682</text>
  <text class="label" x="1348" y="1160">SMALLER</text><text class="metricGreen" x="1348" y="1198">5.0x</text>

  <rect class="card" x="72" y="1190" width="736" height="250" rx="22"/>
  <text class="label" x="104" y="1232">WORKFLOW AVERAGE</text><text class="metricBlue" x="104" y="1270">Call graph</text><text class="small" x="300" y="1265">4 runs</text>
  <text class="label" x="104" y="1308">STANDARD TOOL</text><text class="mono" x="104" y="1338">cat &lt;4 analysis files&gt;</text>
  <text class="label" x="104" y="1374">MCP TOOL</text><text class="mono" x="104" y="1404">call_graph(symbol_name=...)</text>
  <text class="label" x="104" y="1440">RAW AVG</text><text class="metric" x="104" y="1478">5,572</text>
  <text class="label" x="244" y="1440">MCP AVG</text><text class="metric" x="244" y="1478">267</text>
  <text class="label" x="384" y="1440">SAVED</text><text class="metric" x="384" y="1478">5,305</text>
  <text class="label" x="548" y="1440">SMALLER</text><text class="metricGreen" x="548" y="1478">20.9x</text>

  <rect class="card" x="872" y="1190" width="736" height="250" rx="22"/>
  <text class="label" x="904" y="1232">WORKFLOW AVERAGE</text><text class="metricBlue" x="904" y="1270">Repo search</text><text class="small" x="1120" y="1265">3 runs</text>
  <text class="label" x="904" y="1308">STANDARD TOOL</text><text class="mono" x="904" y="1338">cat src/analysis/*.rs</text>
  <text class="label" x="904" y="1374">MCP TOOL</text><text class="mono" x="904" y="1404">find_usages(symbol=...)</text>
  <text class="label" x="904" y="1440">RAW AVG</text><text class="metric" x="904" y="1478">98,312</text>
  <text class="label" x="1044" y="1440">MCP AVG</text><text class="metric" x="1044" y="1478">1,263</text>
  <text class="label" x="1184" y="1440">SAVED</text><text class="metric" x="1184" y="1478">97,049</text>
  <text class="label" x="1348" y="1440">SMALLER</text><text class="metricGreen" x="1348" y="1478">77.8x</text>

  <rect class="card" x="72" y="1470" width="1536" height="250" rx="22"/>
  <text class="label" x="104" y="1512">WORKFLOW AVERAGE</text><text class="metricBlue" x="104" y="1550">Directory map</text><text class="small" x="360" y="1545">3 runs</text>
  <text class="label" x="104" y="1588">STANDARD TOOL</text><text class="mono" x="104" y="1618">find &lt;3 source trees&gt; -exec cat</text>
  <text class="label" x="104" y="1654">MCP TOOL</text><text class="mono" x="104" y="1684">code_map(detail=minimal)</text>
  <text class="label" x="104" y="1720">RAW AVG</text><text class="metric" x="104" y="1758">76,179</text>
  <text class="label" x="288" y="1720">MCP AVG</text><text class="metric" x="288" y="1758">2,755</text>
  <text class="label" x="472" y="1720">SAVED</text><text class="metric" x="472" y="1758">73,424</text>
  <text class="label" x="688" y="1720">SMALLER</text><text class="metricGreen" x="688" y="1758">27.7x</text>
  <text class="small" x="104" y="1800">Average saved tokens = raw average tokens - MCP average tokens. All counts were measured with tiktoken_rs::cl100k_base() after rebuilding the server.</text>
</svg>
